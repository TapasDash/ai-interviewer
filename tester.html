<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERBERUS PROBE v1.4 - A2A ENABLED</title>
    <style>
        :root {
            --bg: #0f172a;
            --terminal-bg: #020617;
            --accent: #22d3ee;
            --text: #f8fafc;
            --error: #f43f5e;
            --success: #10b981;
            --warning: #fbbf24;
            --highlight: #a855f7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            background: #1e293b;
        }

        .status-open { color: var(--success); border: 1px solid var(--success); }
        .status-closed { color: var(--error); border: 1px solid var(--error); }

        #terminal {
            flex-grow: 1;
            background-color: var(--terminal-bg);
            border: 1px solid #1e293b;
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .log-entry {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .log-sys { border-left-color: #64748b; color: #94a3b8; }
        .log-mic { border-left-color: var(--warning); color: var(--warning); }
        .log-ai { border-left-color: var(--highlight); color: var(--highlight); font-weight: bold; }
        .log-stt { border-left-color: var(--success); color: var(--success); font-style: italic; }

        .timestamp {
            color: #475569;
            font-size: 11px;
            margin-right: 10px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
        }

        .row { display: flex; gap: 10px; align-items: center; }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
        }

        .btn-kickstart { background: linear-gradient(to right, #f97316, #ef4444); color: white; }
        .btn-mic-start { background: var(--warning); color: var(--bg); }
        .btn-mic-stop { background: var(--error); color: var(--text); }

        button:hover { opacity: 0.8; transform: scale(1.02); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .waveform {
            display: none;
            gap: 3px;
            height: 20px;
            align-items: center;
        }

        .bar {
            width: 3px;
            height: 100%;
            background: var(--warning);
            border-radius: 10px;
            animation: bounce 0.8s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        .bar-ai { background: var(--highlight); }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">
            PROJECT <span style="color: var(--accent)">CERBERUS</span> PROBE v1.4
        </div>
        <div id="status" class="status-pill status-closed">Disconnected</div>
    </header>

    <div id="terminal"></div>

    <div class="controls">
        <div class="row">
            <button id="kickstart" class="btn-kickstart">🔥 Kickstart Interview</button>
            <button id="mic-start" class="btn-mic-start">🎤 Start Session</button>
            <button id="mic-stop" class="btn-mic-stop" disabled>🛑 Stop Mic</button>
            
            <div id="wave-container" class="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <span id="wave-text" style="color: var(--warning); font-size: 10px; margin-left: 5px;">A2A ACTIVE</span>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const statusPill = document.getElementById('status');
        const kickstartBtn = document.getElementById('kickstart');
        const micStartBtn = document.getElementById('mic-start');
        const micStopBtn = document.getElementById('mic-stop');
        const waveform = document.getElementById('wave-container');
        const waveText = document.getElementById('wave-text');

        const CANDIDATE_ID = 'tester_forensic_001';
        const WS_URL = `ws://localhost:8080?candidateId=${CANDIDATE_ID}`;

        let ws = null;
        let audioCtx = null;
        let micStream = null;
        let processor = null;

        // [SPEAKER STATE]
        let nextStartTime = 0;
        const SAMPLE_RATE = 16000;

        function log(msg, type = 'sys') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
            nextStartTime = audioCtx.currentTime;
            log('Audio Engine Online (16kHz).', 'sys');
        }

        /**
         * playPCM: Gapless binary playback.
         * Converts raw Int16 binary data to Float32 and schedules it.
         */
        function playPCM(arrayBuffer) {
            if (!audioCtx) return;

            const int16Data = new Int16Array(arrayBuffer);
            const float32Data = new Float32Array(int16Data.length);
            
            for (let i = 0; i < int16Data.length; i++) {
                float32Data[i] = int16Data[i] / 32768.0;
            }

            const buffer = audioCtx.createBuffer(1, float32Data.length, SAMPLE_RATE);
            buffer.copyToChannel(float32Data, 0);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);

            // Schedule for gapless playback
            const start = Math.max(audioCtx.currentTime, nextStartTime);
            source.start(start);
            nextStartTime = start + buffer.duration;

            // Visual feedback
            waveText.textContent = 'CERBERUS SPEAKING...';
            waveText.style.color = 'var(--highlight)';
            Array.from(document.querySelectorAll('.bar')).forEach(b => b.classList.add('bar-ai'));
        }

        async function startMic() {
            await initAudio();
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(micStream);
                processor = audioCtx.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;
                    const float32 = e.inputBuffer.getChannelData(0);
                    const int16 = new Int16Array(float32.length);
                    for (let i = 0; i < float32.length; i++) {
                        const s = Math.max(-1, Math.min(1, float32[i]));
                        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    ws.send(int16.buffer);
                };

                micStartBtn.disabled = true;
                micStopBtn.disabled = false;
                waveform.style.display = 'flex';
                waveText.textContent = 'LISTENING...';
                waveText.style.color = 'var(--warning)';
                Array.from(document.querySelectorAll('.bar')).forEach(b => b.classList.remove('bar-ai'));
                log('Mic Active.', 'mic');

            } catch (err) {
                log(`MIC_ERROR: ${err.message}`, 'error');
            }
        }

        function stopMic() {
            if (processor) processor.disconnect();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            micStartBtn.disabled = false;
            micStopBtn.disabled = true;
            waveform.style.display = 'none';
            log('Mic Deactivated.', 'mic');
        }

        function connect() {
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                log('Handshake Secure.', 'sys');
                statusPill.textContent = 'OPEN';
                statusPill.className = 'status-pill status-open';
            };

            ws.onmessage = (e) => {
                if (e.data instanceof ArrayBuffer) {
                    playPCM(e.data);
                } else {
                    const data = JSON.parse(e.data);
                    if (data.type === 'text') log(`Cerberus: ${data.content}`, 'ai');
                    if (data.type === 'transcript') log(`[📝 STT]: ${data.content}`, 'stt');
                }
            };

            ws.onclose = () => {
                statusPill.textContent = 'CLOSED';
                statusPill.className = 'status-pill status-closed';
                setTimeout(connect, 2000);
            };
        }

        micStartBtn.onclick = startMic;
        micStopBtn.onclick = stopMic;
        kickstartBtn.onclick = () => {
            ws.send(JSON.stringify({ type: 'text', content: 'START_INTERVIEW' }));
            log('IGNITION: Interview kickstarted.', 'sys');
        };

        connect();
    </script>
</body>
</html>
