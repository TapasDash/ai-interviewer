<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERBERUS PROBE v1.1 - ELITE EAR</title>
    <style>
        :root {
            --bg: #0f172a;
            --terminal-bg: #020617;
            --accent: #22d3ee;
            --text: #f8fafc;
            --error: #f43f5e;
            --success: #10b981;
            --warning: #fbbf24;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            background: #1e293b;
        }

        .status-open { color: var(--success); border: 1px solid var(--success); }
        .status-closed { color: var(--error); border: 1px solid var(--error); }
        .status-connecting { color: var(--accent); border: 1px solid var(--accent); }

        #terminal {
            flex-grow: 1;
            background-color: var(--terminal-bg);
            border: 1px solid #1e293b;
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .log-entry {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .log-in { border-left-color: var(--accent); color: var(--accent); }
        .log-out { border-left-color: var(--success); color: var(--success); }
        .log-sys { border-left-color: #64748b; color: #94a3b8; }
        .log-mic { border-left-color: var(--warning); color: var(--warning); }

        .timestamp {
            color: #475569;
            font-size: 11px;
            margin-right: 10px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: var(--terminal-bg);
            border: 1px solid #1e293b;
            color: var(--accent);
            padding: 12px;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
        }

        .btn-send { background: var(--accent); color: var(--bg); }
        .btn-mic-start { background: var(--warning); color: var(--bg); }
        .btn-mic-stop { background: var(--error); color: var(--text); }

        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">
            PROJECT <span style="color: var(--accent)">CERBERUS</span> PROBE v1.1
        </div>
        <div id="status" class="status-pill status-connecting">Disconnected</div>
    </header>

    <div id="terminal">
        <div class="log-entry log-sys">
            <span class="timestamp">[SYS]</span> Cerberus Forensics initialized. Waiting for uplink...
        </div>
    </div>

    <div class="controls">
        <div class="row">
            <button id="mic-start" class="btn-mic-start">Start Mic</button>
            <button id="mic-stop" class="btn-mic-stop" disabled>Stop Mic</button>
            <div style="flex-grow: 1"></div>
            <div id="mic-indicator" style="color: var(--warning); font-size: 12px; display: none; align-self: center;">
                ● STREAMING 16KHZ PCM...
            </div>
        </div>
        <form class="row" id="probe-form">
            <input type="text" id="probe-input" placeholder="Probe Gemini via text..." autocomplete="off">
            <button type="submit" id="probe-send" class="btn-send">Send</button>
        </form>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const statusPill = document.getElementById('status');
        const form = document.getElementById('probe-form');
        const input = document.getElementById('probe-input');
        const sendBtn = document.getElementById('probe-send');
        
        const micStartBtn = document.getElementById('mic-start');
        const micStopBtn = document.getElementById('mic-stop');
        const micIndicator = document.getElementById('mic-indicator');

        // Config
        const CANDIDATE_ID = 'tester_forensic_001';
        const WS_URL = `ws://localhost:8080?candidateId=${CANDIDATE_ID}`;

        let ws = null;
        let audioContext = null;
        let micStream = null;
        let processor = null;

        function log(msg, type = 'sys') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, fractionDigits: 3 });
            entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateStatus(state) {
            statusPill.textContent = state;
            statusPill.className = `status-pill status-${state.toLowerCase()}`;
            sendBtn.disabled = state !== 'OPEN';
            micStartBtn.disabled = state !== 'OPEN';
        }

        /**
         * [ELITE EAR LOGIC]
         * INTENT: Capture microphone input and transform it into a raw 16kHz Int16 PCM stream.
         * 
         * LOGIC:
         * 1. Linear Scaling: browser Float32 (-1.0 to 1.0) is multiplied by 32767.
         * 2. Clamping: We ensure values stay within the 16-bit range (-32768 to 32767).
         * 3. Quantization: The result is stored in an Int16Array, dropping floating point precision.
         */
        async function startMic() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                const source = audioContext.createMediaStreamSource(micStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;

                    const float32Data = e.inputBuffer.getChannelData(0);
                    const int16Data = new Int16Array(float32Data.length);

                    for (let i = 0; i < float32Data.length; i++) {
                        // Linear PCM conversion math: 
                        // S = Math.max(-1, Math.min(1, float32Data[i])) * 0x7FFF
                        const s = Math.max(-1, Math.min(1, float32Data[i]));
                        int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }

                    // Flush raw binary buffer down the socket
                    ws.send(int16Data.buffer);
                };

                micStartBtn.disabled = true;
                micStopBtn.disabled = false;
                micIndicator.style.display = 'block';
                log('ELITE_EAR: 16kHz PCM Stream started.', 'mic');

            } catch (err) {
                log(`MIC_ERROR: ${err.message}`, 'sys');
            }
        }

        function stopMic() {
            if (processor) processor.disconnect();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            
            micStartBtn.disabled = false;
            micStopBtn.disabled = true;
            micIndicator.style.display = 'none';
            log('ELITE_EAR: Stream terminated.', 'mic');
        }

        function connect() {
            log(`Opening uplink to ${WS_URL}...`, 'sys');
            updateStatus('CONNECTING');

            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer'; // Crucial for raw binary frames

            ws.onopen = () => {
                log('Forensic Uplink Established.', 'sys');
                updateStatus('OPEN');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    log(`AI_REPLY: ${data.content}`, 'in');
                } catch (e) {
                    log(`RAW_RECV: ${event.data.byteLength || event.data.length} bytes`, 'in');
                }
            };

            ws.onclose = () => {
                log('Uplink severed.', 'sys');
                updateStatus('CLOSED');
                stopMic();
                setTimeout(connect, 3000);
            };
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const val = input.value.trim();
            if (!val || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'text', content: val }));
            log(`USER_TEXT: ${val}`, 'out');
            input.value = '';
        };

        micStartBtn.onclick = startMic;
        micStopBtn.onclick = stopMic;

        // Initialize
        connect();
    </script>
</body>
</html>
