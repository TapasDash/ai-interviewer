<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERBERUS PROBE v1.2 - LIVE UPLINK</title>
    <style>
        :root {
            --bg: #0f172a;
            --terminal-bg: #020617;
            --accent: #22d3ee;
            --text: #f8fafc;
            --error: #f43f5e;
            --success: #10b981;
            --warning: #fbbf24;
            --highlight: #a855f7;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            background: #1e293b;
        }

        .status-open { color: var(--success); border: 1px solid var(--success); }
        .status-closed { color: var(--error); border: 1px solid var(--error); }

        #terminal {
            flex-grow: 1;
            background-color: var(--terminal-bg);
            border: 1px solid #1e293b;
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .log-entry {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .log-in { border-left-color: var(--accent); color: var(--accent); }
        .log-out { border-left-color: var(--success); color: var(--success); }
        .log-sys { border-left-color: #64748b; color: #94a3b8; }
        .log-mic { border-left-color: var(--warning); color: var(--warning); }
        .log-ai { border-left-color: var(--highlight); color: var(--highlight); font-weight: bold; }
        .log-stt { border-left-color: var(--success); color: var(--success); font-style: italic; }

        .timestamp {
            color: #475569;
            font-size: 11px;
            margin-right: 10px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex-grow: 1;
            background: var(--terminal-bg);
            border: 1px solid #334155;
            color: var(--accent);
            padding: 12px;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
        }

        .btn-kickstart { background: linear-gradient(to right, #f97316, #ef4444); color: white; }
        .btn-mic-start { background: var(--warning); color: var(--bg); }
        .btn-mic-stop { background: var(--error); color: var(--text); }
        .btn-send { background: var(--accent); color: var(--bg); }

        button:hover { opacity: 0.8; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        /* WAVEFORM ANIMATION */
        .waveform {
            display: none;
            gap: 3px;
            height: 20px;
            align-items: center;
        }

        .bar {
            width: 3px;
            height: 100%;
            background: var(--warning);
            border-radius: 10px;
            animation: bounce 0.8s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">
            PROJECT <span style="color: var(--accent)">CERBERUS</span> PROBE v1.2
        </div>
        <div id="status" class="status-pill status-closed">Disconnected</div>
    </header>

    <div id="terminal">
        <div class="log-entry log-sys">
            <span class="timestamp">[SYS]</span> Initializing Cerberus Live Uplink...
        </div>
    </div>

    <div class="controls">
        <div class="row">
            <button id="kickstart" class="btn-kickstart">🔥 Kickstart Interview</button>
            <button id="mic-start" class="btn-mic-start">🎤 Start Mic</button>
            <button id="mic-stop" class="btn-mic-stop" disabled>🛑 Stop & Interrupt</button>
            
            <div id="wave-container" class="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <span style="color: var(--warning); font-size: 10px; margin-left: 5px;">LIVE 16KHZ</span>
            </div>
        </div>

        <form class="row" id="probe-form">
            <input type="text" id="probe-input" placeholder="Speak to Cerberus or type here..." autocomplete="off">
            <button type="submit" id="probe-send" class="btn-send">Send</button>
        </form>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const statusPill = document.getElementById('status');
        const form = document.getElementById('probe-form');
        const input = document.getElementById('probe-input');
        const sendBtn = document.getElementById('probe-send');
        const kickstartBtn = document.getElementById('kickstart');
        
        const micStartBtn = document.getElementById('mic-start');
        const micStopBtn = document.getElementById('mic-stop');
        const waveform = document.getElementById('wave-container');

        const CANDIDATE_ID = 'tester_forensic_001';
        const WS_URL = `ws://localhost:8080?candidateId=${CANDIDATE_ID}`;

        let ws = null;
        let audioContext = null;
        let micStream = null;
        let processor = null;

        function log(msg, type = 'sys') {
            const entry = document.createElement('div');
            
            // AUTOMATIC FORENSIC HIGHLIGHTING
            let finalType = type;
            if (msg.includes('[📤 AI_REPLYING]')) finalType = 'ai';
            if (msg.includes('[📝 STT_FINAL]')) finalType = 'stt';

            entry.className = `log-entry log-${finalType}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, fractionDigits: 3 });
            entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateStatus(state) {
            statusPill.textContent = state;
            statusPill.className = `status-pill status-${state.toLowerCase()}`;
            const isOpen = state === 'OPEN';
            sendBtn.disabled = !isOpen;
            micStartBtn.disabled = !isOpen;
            kickstartBtn.disabled = !isOpen;
        }

        async function startMic() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(micStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (!ws || ws.readyState !== WebSocket.OPEN) return;
                    const float32Data = e.inputBuffer.getChannelData(0);
                    const int16Data = new Int16Array(float32Data.length);
                    for (let i = 0; i < float32Data.length; i++) {
                        const s = Math.max(-1, Math.min(1, float32Data[i]));
                        int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    ws.send(int16Data.buffer);
                };

                micStartBtn.disabled = true;
                micStopBtn.disabled = false;
                waveform.style.display = 'flex';
                log('ELITE_EAR: High-frequency PCM stream active.', 'mic');

            } catch (err) {
                log(`MIC_ERROR: ${err.message}`, 'error');
            }
        }

        function stopMic() {
            if (processor) processor.disconnect();
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            micStartBtn.disabled = false;
            micStopBtn.disabled = true;
            waveform.style.display = 'none';
            log('ELITE_EAR: Stream terminated.', 'mic');
        }

        function connect() {
            log(`Uplink: Opening live pipe to ${WS_URL}...`, 'sys');
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                log('Forensic Uplink Established.', 'sys');
                updateStatus('OPEN');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    // Check if it's a raw log or a structured message
                    if (data.type === 'text') {
                        log(`[📤 AI_REPLYING]: ${data.content}`, 'ai');
                    } else if (data.transcript) {
                        log(`[📝 STT_FINAL]: "${data.transcript}"`, 'stt');
                    } else {
                        log(`RECV: ${JSON.stringify(data)}`, 'in');
                    }
                } catch (e) {
                    log(`RAW_DATA: ${event.data.byteLength || event.data.length} bytes`, 'in');
                }
            };

            ws.onclose = () => {
                log('Uplink severed.', 'error');
                updateStatus('CLOSED');
                stopMic();
                setTimeout(connect, 3000);
            };
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const val = input.value.trim();
            if (!val || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'text', content: val }));
            log(`USER_TEXT: ${val}`, 'out');
            input.value = '';
        };

        kickstartBtn.onclick = () => {
            ws.send(JSON.stringify({ type: 'text', content: 'START_INTERVIEW' }));
            log('IGNITION: Manual Kickstart sent.', 'sys');
        };

        micStartBtn.onclick = startMic;
        micStopBtn.onclick = stopMic;

        connect();
    </script>
</body>
</html>
