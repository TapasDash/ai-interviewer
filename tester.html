<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERBERUS PROBE v1.0</title>
    <style>
        :root {
            --bg: #0f172a;
            --terminal-bg: #020617;
            --accent: #22d3ee;
            --text: #f8fafc;
            --error: #f43f5e;
            --success: #10b981;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            background: #1e293b;
        }

        .status-open { color: var(--success); border: 1px solid var(--success); }
        .status-closed { color: var(--error); border: 1px solid var(--error); }
        .status-connecting { color: var(--accent); border: 1px solid var(--accent); }

        #terminal {
            flex-grow: 1;
            background-color: var(--terminal-bg);
            border: 1px solid #1e293b;
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .log-entry {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
            border-left: 2px solid transparent;
            padding-left: 10px;
        }

        .log-in { border-left-color: var(--accent); color: var(--accent); }
        .log-out { border-left-color: var(--success); color: var(--success); }
        .log-sys { border-left-color: #64748b; color: #94a3b8; }

        .timestamp {
            color: #475569;
            font-size: 11px;
            margin-right: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: var(--terminal-bg);
            border: 1px solid #1e293b;
            color: var(--accent);
            padding: 12px;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">
            PROJECT <span style="color: var(--accent)">CERBERUS</span> PROBE
        </div>
        <div id="status" class="status-pill status-connecting">Disconnected</div>
    </header>

    <div id="terminal">
        <div class="log-entry log-sys">
            <span class="timestamp">[SYS]</span> Initializing Forensic Uplink...
        </div>
    </div>

    <form class="controls" id="probe-form">
        <input type="text" id="probe-input" placeholder="Type text to probe Gemini Brain..." autocomplete="off">
        <button type="submit" id="probe-send">SEND</button>
    </form>

    <script>
        const terminal = document.getElementById('terminal');
        const statusPill = document.getElementById('status');
        const form = document.getElementById('probe-form');
        const input = document.getElementById('probe-input');
        const sendBtn = document.getElementById('probe-send');

        // Config: Change candidateId if needed
        const CANDIDATE_ID = 'tester_forensic_001';
        const WS_URL = `ws://localhost:8080?candidateId=${CANDIDATE_ID}`;

        let ws = null;

        function log(msg, type = 'sys') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, fractionDigits: 3 });
            entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
            
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateStatus(state) {
            statusPill.textContent = state;
            statusPill.className = `status-pill status-${state.toLowerCase()}`;
            sendBtn.disabled = state !== 'OPEN';
        }

        function connect() {
            log(`Attempting connection to ${WS_URL}...`, 'sys');
            updateStatus('CONNECTING');

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                log('Forensic Uplink Established.', 'sys');
                updateStatus('OPEN');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    log(`RECEIVED: ${data.content}`, 'in');
                } catch (e) {
                    log(`RAW_RECV: ${event.data}`, 'in');
                }
            };

            ws.onclose = () => {
                log('Connection severed by remote host.', 'sys');
                updateStatus('CLOSED');
                // Auto-reconnect after 3 seconds
                setTimeout(connect, 3000);
            };

            ws.onerror = (err) => {
                log(`UPLINK_ERROR: Terminal failure detected.`, 'sys');
            };
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const val = input.value.trim();
            if (!val || !ws || ws.readyState !== WebSocket.OPEN) return;

            const packet = { type: 'text', content: val };
            ws.send(JSON.stringify(packet));
            log(`SENT: ${val}`, 'out');
            input.value = '';
        };

        // Initialize
        connect();
    </script>
</body>
</html>
